events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging settings
    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log warn;

    # Performance tuning
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    server_tokens off; # Hide Nginx version

    # gzip compression
    gzip on;
    gzip_disable "msie6";
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Rate Limiting Configuration
    # 10m zone can hold ~160,000 unique IP addresses in memory
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=2r/s;
    limit_req_status 429;

    # 🛡️ Drop requests with invalid Host headers (Fixes Cloud Metadata Exposure SSRF)
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        listen 443 ssl default_server;
        listen [::]:443 default_server;
        server_name _;

        ssl_certificate /etc/letsencrypt/live/paperlessboss.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/paperlessboss.com/privkey.pem;

        return 444; # Drop the connection immediately
    }

    # HTTP - Redirect all traffic to HTTPS securely
    server {
        listen 80;
        listen [::]:80;
        server_name paperlessboss.com www.paperlessboss.com;

        # Let's Encrypt renewal validation directory (ACME challenge)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://paperlessboss.com$request_uri;
        }
    }

    # HTTPS - Reverse Proxy & Security Hardening
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name paperlessboss.com www.paperlessboss.com;

        # SSL Certificates (Mounted from Let's Encrypt host directory)
        ssl_certificate /etc/letsencrypt/live/paperlessboss.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/paperlessboss.com/privkey.pem;

        # Modern SSL/TLS Hardening
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA256:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA256';
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # Robust Security Headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://skzceavurcikyajjtpar.supabase.co; frame-ancestors 'none'; form-action 'self';" always;

        # 🌐 Serve Static Frontend Files
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # 🔒 Tighter Rate Limiting for Authentication endpoints (login, register, otp)
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://api:8000;
            proxy_http_version 1.1;
            
            # Connection upgrades
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            
            # Real client IP forwarding
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # 🔒 Reverse Proxy to FastAPI 'api' service inside Docker Network
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://api:8000;
            proxy_http_version 1.1;
            
            # Connection upgrades
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            
            # Real client IP forwarding
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # 🔒 Reverse Proxy to FastAPI 'api' service for Excel validation
        location /validate-excel {
            proxy_pass http://api:8000;
            proxy_http_version 1.1;
            
            # Connection upgrades
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            
            # Real client IP forwarding
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Allow larger Excel file uploads
            client_max_body_size 10M;
        }

        # Enable interactive Swagger documentation access
        location /docs {
            proxy_pass http://api:8000/docs;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Enable openapi schema access
        location /openapi.json {
            proxy_pass http://api:8000/openapi.json;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
