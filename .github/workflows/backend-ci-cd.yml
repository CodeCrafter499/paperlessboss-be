name: Backend CI/CD (Dev to Main)

on:
  push:
    branches: [ dev, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Backend Tests (Pytest)
      env:
        ENVIRONMENT: "test"
        SECRET_KEY: "temporary_dev_test_key_for_github_actions_validation_bypass"
        DB_HOST: "localhost"
        DB_PORT: "5432"
        DB_NAME: "testdb"
        DB_USER: "postgres"
        DB_PASS: "postgres"
      run: |
        pytest tests/

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Copy backend files to AWS Server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: '13.62.50.7'
        username: 'ubuntu'
        key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
        source: "."
        target: "/home/ubuntu/app/backend"
        rm: false # Do not delete files on server (keeps your manually created .env file safe!)

    - name: Start Docker Compose on AWS via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: '13.62.50.7'
        username: 'ubuntu'
        key: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
        script: |
          cd /home/ubuntu/app/backend
          # Restart uvicorn containers using production docker-compose
          docker compose -f docker-compose.prod.yml up --build -d
